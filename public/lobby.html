<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QEMY — Card Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --midnight: #0a0e1a;
      --red: #e63946;
      --orange: #f4a261;
      --purple: #7b2d8b;
      --card-bg: #111827;
      --text: #f0ede8;
      --muted: #6b7280;
    }

    body {
      background: var(--midnight);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--red); top: -150px; left: -150px; animation-delay: 0s; }
    .blob-2 { width: 400px; height: 400px; background: var(--purple); bottom: -120px; right: -100px; animation-delay: -4s; }
    .blob-3 { width: 300px; height: 300px; background: var(--orange); top: 50%; left: 60%; animation-delay: -8s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      padding: 0 24px;
      text-align: center;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(64px, 15vw, 100px);
      letter-spacing: -4px;
      line-height: 1;
      background: linear-gradient(135deg, var(--red) 0%, var(--orange) 60%, #fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 48px;
    }

    .card-panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 36px 32px;
      backdrop-filter: blur(12px);
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      text-align: left;
    }

    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 24px;
    }
    input[type="text"]:focus { border-color: var(--orange); }
    input[type="text"]::placeholder { color: var(--muted); }

    .player-count-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      text-align: left;
    }

    .count-options {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .count-btn {
      flex: 1;
      padding: 12px 8px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .count-btn.active {
      border-color: var(--orange);
      background: rgba(244,162,97,0.12);
      color: var(--orange);
    }
    .count-btn:hover:not(.active) {
      border-color: rgba(255,255,255,0.25);
      color: var(--text);
    }

    .create-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--red), var(--orange));
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 30px rgba(230,57,70,0.3);
    }
    .create-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(230,57,70,0.5);
    }
    .create-btn:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 28px 0;
    }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
    .divider-text { font-size: 11px; color: var(--muted); letter-spacing: 2px; }

    .join-row {
      display: flex;
      gap: 10px;
    }
    .join-row input { margin-bottom: 0; flex: 1; text-transform: uppercase; letter-spacing: 2px; }
    .join-btn {
      padding: 14px 20px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .join-btn:hover { border-color: var(--purple); color: var(--purple); }

    .error-msg {
      color: var(--red);
      font-size: 12px;
      margin-top: 12px;
      min-height: 18px;
    }

    /* Floating cards decoration */
    .float-card {
      position: fixed;
      width: 60px;
      height: 90px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.06);
      opacity: 0.12;
      animation: floatCard 8s ease-in-out infinite;
      pointer-events: none;
    }
    .float-card:nth-child(1) { background: var(--red); top: 10%; left: 5%; animation-delay: 0s; transform: rotate(-15deg); }
    .float-card:nth-child(2) { background: var(--purple); top: 60%; left: 8%; animation-delay: -2s; transform: rotate(10deg); }
    .float-card:nth-child(3) { background: var(--orange); top: 20%; right: 6%; animation-delay: -4s; transform: rotate(20deg); }
    .float-card:nth-child(4) { background: #2a9d8f; bottom: 15%; right: 9%; animation-delay: -6s; transform: rotate(-8deg); }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0) rotate(var(--rot, -15deg)); }
      50% { transform: translateY(-20px) rotate(var(--rot, -15deg)); }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="float-card"></div>
  <div class="float-card"></div>
  <div class="float-card"></div>
  <div class="float-card"></div>

  <div class="container">
    <div class="logo">QEMY</div>
    <div class="tagline">كيمي · Chemistry-themed card game</div>

    <div class="card-panel">
      <div class="section-label">Your Name</div>
      <input type="text" id="hostName" placeholder="Enter your name" maxlength="20">

      <div class="player-count-label">Players</div>
      <div class="count-options">
        <button class="count-btn active" data-count="2">2</button>
        <button class="count-btn" data-count="3">3</button>
        <button class="count-btn" data-count="4">4</button>
      </div>

      <button class="create-btn" onclick="createRoom()">Create Room →</button>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">OR JOIN</div>
        <div class="divider-line"></div>
      </div>

      <div class="join-row">
        <input type="text" id="joinName" placeholder="Your name" maxlength="20">
        <input type="text" id="joinCode" placeholder="ROOM CODE" maxlength="8" style="letter-spacing:3px">
        <button class="join-btn" onclick="joinRoom()">Join</button>
      </div>

      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <script>
    let selectedCount = 2;

    document.querySelectorAll('.count-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedCount = parseInt(btn.dataset.count);
      });
    });

    async function createRoom() {
      const name = document.getElementById('hostName').value.trim();
      if (!name) { showError('Enter your name first.'); return; }

      const res = await fetch('/api/create-room', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ maxPlayers: selectedCount })
      });
      const data = await res.json();
      // Store name and redirect
      sessionStorage.setItem('playerName', name);
      window.location.href = `/room/${data.roomId}`;
    }

    function joinRoom() {
      const name = document.getElementById('joinName').value.trim();
      const code = document.getElementById('joinCode').value.trim().toUpperCase();
      if (!name) { showError('Enter your name.'); return; }
      if (!code) { showError('Enter a room code.'); return; }
      sessionStorage.setItem('playerName', name);
      window.location.href = `/room/${code}`;
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      setTimeout(() => el.textContent = '', 3000);
    }

    // Allow enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('joinCode') === document.activeElement) joinRoom();
        else createRoom();
      }
    });
  </script>
</body>
</html>
